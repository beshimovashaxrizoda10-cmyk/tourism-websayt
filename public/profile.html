<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Profilim - BookMarket</title>
    <!-- Tailwind CSS va FontAwesome -->
    <link rel="stylesheet" href="./css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-darkBg font-sans text-lightText min-h-screen flex flex-col relative">

    <!-- Navbar -->
    <header class="bg-darkCard shadow-sm border-b border-darkBorder sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <button onclick="window.location.href='/'" class="flex items-center gap-2 text-grayText hover:text-primary transition-colors group">
                <i class="fa-solid fa-arrow-left text-xl group-hover:-translate-x-1 transition-transform"></i> 
                <span class="font-bold hidden sm:inline">Asosiyga qaytish</span>
            </button>
            <div class="flex items-center gap-2 text-primary">
                <i class="fa-solid fa-id-card-clip text-2xl"></i>
                <h1 class="text-xl font-black uppercase tracking-widest">Mening Kabinetim</h1>
            </div>
            <!-- ADMIN PANEL TUGMASI (Faqat adminlarga ko'rinadi) -->
            <button id="adminPanelBtn" onclick="window.location.href='/admin.html'" class="hidden bg-secondary text-white px-5 py-2 rounded-xl font-black hover:bg-opacity-90 transition-all shadow-lg">
                Admin Panel
            </button>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl">
        
        <!-- 1. SHAXSIY MA'LUMOTLAR BO'LIMI -->
        <div id="profileHeader" class="bg-darkCard rounded-[2.5rem] shadow-2xl border border-darkBorder p-8 md:p-12 mb-12 relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-8">
            <div class="absolute -right-24 -top-24 w-80 h-80 bg-primary opacity-10 rounded-full blur-[80px] pointer-events-none"></div>
            
            <div class="flex flex-col md:flex-row items-center gap-8 z-10 w-full md:w-auto">
                <div id="pInitials" class="w-32 h-32 bg-primary/20 text-primary border-2 border-primary rounded-full flex items-center justify-center font-black text-5xl shadow-[0_0_30px_rgba(16,185,129,0.3)] shrink-0">
                    U
                </div>
                <div class="text-center md:text-left">
                    <h2 id="pName" class="text-4xl font-black text-lightText mb-3">Yuklanmoqda...</h2>
                    <div id="pInfo" class="flex flex-wrap justify-center md:justify-start gap-4 text-sm">
                        <!-- JS orqali to'ldiriladi: Telefon, Manzil -->
                    </div>
                </div>
            </div>

            <button id="editProfileBtn" class="w-full md:w-auto bg-darkBg border border-darkBorder text-lightText px-8 py-4 rounded-2xl font-black hover:bg-darkBorder hover:text-primary transition-all z-10 flex items-center justify-center gap-3 shadow-lg group">
                <i class="fa-solid fa-user-pen text-primary group-hover:scale-110 transition-transform"></i> Profilni tahrirlash
            </button>
        </div>

        <!-- 2. NAVIGATION TABS (E'lonlar, Obunalar, Obunachilar) -->
        <div class="flex gap-8 border-b border-darkBorder mb-8 overflow-x-auto">
            <button id="tabBooks" class="pb-4 text-xl font-black text-primary border-b-2 border-primary transition-colors focus:outline-none whitespace-nowrap">
                E'lonlarim
            </button>
            <button id="tabFollowing" class="pb-4 text-xl font-black text-grayText border-b-2 border-transparent hover:text-lightText transition-colors focus:outline-none whitespace-nowrap">
                Obunalarim
            </button>
            <button id="tabFollowers" class="pb-4 text-xl font-black text-grayText border-b-2 border-transparent hover:text-lightText transition-colors focus:outline-none whitespace-nowrap">
                Obunachilarim
            </button>
        </div>

        <!-- 3. CONTENT AREAS -->
        <!-- E'lonlar ro'yxati -->
        <div id="contentBooks" class="block animate-fade-in">
            <div id="myBooksContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 mb-12">
                <div class="col-span-full text-center py-20">
                    <i class="fa-solid fa-spinner fa-spin text-5xl text-primary"></i>
                </div>
            </div>
        </div>

        <!-- Obuna va Obunachilar ro'yxati (Network) -->
        <div id="contentNetwork" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
            <!-- JS tomonidan renderNetwork() orqali to'ldiriladi -->
        </div>

    </main>

    <!-- === A. PROFIL VA XAVFSIZLIK TAHRIRLASH MODALI === -->
    <div id="editModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md overflow-y-auto">
        <div class="bg-darkCard w-full max-w-lg rounded-[2rem] border border-darkBorder p-8 shadow-2xl my-auto">
            <h3 class="text-2xl font-black mb-6 text-primary border-b border-darkBorder pb-4 flex items-center gap-3">
                <i class="fa-solid fa-user-shield"></i> Profil va Xavfsizlik
            </h3>
            <form id="editForm" class="flex flex-col gap-5">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="editFirstName" placeholder="Ism" required class="bg-darkBg border border-darkBorder p-4 rounded-xl outline-none focus:border-primary">
                    <input type="text" id="editLastName" placeholder="Familiya" required class="bg-darkBg border border-darkBorder p-4 rounded-xl outline-none focus:border-primary">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <select id="editRegion" required class="bg-darkBg border border-darkBorder p-4 rounded-xl outline-none focus:border-primary text-sm cursor-pointer"></select>
                    <select id="editDistrict" required class="bg-darkBg border border-darkBorder p-4 rounded-xl outline-none focus:border-primary text-sm cursor-pointer"></select>
                </div>

                <div class="border-t border-darkBorder/50 my-2"></div>

                <div class="space-y-3">
                    <label class="text-xs font-black text-primary uppercase tracking-widest">Loginni o'zgartirish</label>
                    <input type="text" id="oldPhone" placeholder="Eski telefon raqam (+998...)" class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary">
                    <input type="text" id="newPhone" placeholder="Yangi telefon raqam (Bo'sh bo'lsa eskisi qoladi)" class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary">
                </div>

                <div class="space-y-3">
                    <label class="text-xs font-black text-primary uppercase tracking-widest">Parolni o'zgartirish</label>
                    <input type="password" id="oldPassword" placeholder="Joriy parolingizni kiriting" class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="password" id="newPassword" placeholder="Yangi parol" class="bg-darkBg border border-darkBorder p-4 rounded-xl outline-none focus:border-primary">
                        <input type="password" id="confirmNewPassword" placeholder="Yangi parolni takrorlang" class="bg-darkBg border border-darkBorder p-4 rounded-xl outline-none focus:border-primary">
                    </div>
                </div>
                
                <div class="flex gap-4 mt-4">
                    <button type="button" id="closeModalBtn" class="flex-1 bg-darkBg border border-darkBorder p-4 rounded-xl font-bold hover:bg-gray-800 transition-colors">Bekor qilish</button>
                    <button type="submit" class="flex-1 bg-primary text-darkBg p-4 rounded-xl font-black hover:bg-primaryHover shadow-lg shadow-primary/20 transition-all">Yangilash</button>
                </div>
            </form>
        </div>
    </div>

    <!-- === B. KITOB TAHRIRLASH MODALI === -->
    <div id="editBookModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md overflow-y-auto">
        <div class="bg-darkCard w-full max-w-2xl rounded-[2rem] border border-darkBorder p-8 shadow-2xl my-auto">
            <h3 class="text-2xl font-black mb-8 text-primary border-b border-darkBorder pb-4 flex items-center gap-3">
                <i class="fa-solid fa-pen-to-square"></i> E'lonni tahrirlash
            </h3>
            <form id="editBookForm" class="flex flex-col gap-6">
                <input type="hidden" id="editBookId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-black text-grayText uppercase tracking-widest mb-2 block">Kitob nomi</label>
                        <input type="text" id="ebTitle" required class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary text-lightText">
                    </div>
                    <div>
                        <label class="text-xs font-black text-grayText uppercase tracking-widest mb-2 block">Muallif</label>
                        <input type="text" id="ebAuthor" required class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary text-lightText">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-xs font-black text-grayText uppercase tracking-widest mb-2 block">Narxi (So'm)</label>
                        <input type="number" id="ebPrice" required class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary text-lightText">
                    </div>
                    <div>
                        <label class="text-xs font-black text-grayText uppercase tracking-widest mb-2 block">Sahifalar</label>
                        <input type="number" id="ebPages" required class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary text-lightText">
                    </div>
                    <div>
                        <label class="text-xs font-black text-grayText uppercase tracking-widest mb-2 block">Qog'oz turi</label>
                        <select id="ebPaper" required class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary text-lightText cursor-pointer">
                            <option value="Ofset qog'oz (Oq qog'oz)">Ofset qog'oz (Oq qog'oz)</option>
                            <option value="Gazeta qog'ozi (Sarg'ish)">Gazeta qog'ozi (Sarg'ish)</option>
                            <option value="Melyovanniy qog'oz (Yaltiroq/Silliq)">Melyovanniy qog'oz (Yaltiroq/Silliq)</option>
                            <option value="Kraft qog'oz">Kraft qog'oz</option>
                            <option value="Kitob-dizayner qog'ozi (Sariq/Fil suyagi rangi)">Kitob-dizayner qog'ozi (Sariq/Fil suyagi rangi)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-black text-grayText uppercase tracking-widest mb-2 block">Eni (sm)</label>
                        <input type="number" step="0.1" id="ebWidth" required class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary text-lightText">
                    </div>
                    <div>
                        <label class="text-xs font-black text-grayText uppercase tracking-widest mb-2 block">Bo'yi (sm)</label>
                        <input type="number" step="0.1" id="ebHeight" required class="bg-darkBg border border-darkBorder w-full p-4 rounded-xl outline-none focus:border-primary text-lightText">
                    </div>
                </div>

                <div class="flex gap-4 mt-6">
                    <button type="button" id="closeBookModalBtn" class="flex-1 bg-darkBg border border-darkBorder p-4 rounded-xl font-bold hover:bg-gray-800 transition-all">Bekor qilish</button>
                    <button type="submit" id="saveBookBtn" class="flex-1 bg-primary text-darkBg p-4 rounded-xl font-black hover:bg-primaryHover transition-all flex justify-center items-center gap-2 shadow-lg shadow-primary/20">
                        <i class="fa-solid fa-circle-check"></i> Yangilashni saqlash
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Profil mantiqi uchun JS -->
    <script src="./js/profile.js"></script>
</body>
</html>
