<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Admin Panel - BookMarket</title>
    <link rel="stylesheet" href="./css/tailwind.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-darkBg text-lightText min-h-screen flex flex-col selection:bg-primary/30 relative">

    <!-- === HEADER === -->
    <header class="bg-darkCard/80 backdrop-blur-xl border-b border-darkBorder sticky top-0 z-40 p-4 md:p-6">
        <div class="container mx-auto flex flex-col lg:flex-row justify-between items-center gap-6">
            <div class="flex items-center gap-3 shrink-0">
                <div class="w-12 h-12 bg-secondary rounded-2xl flex items-center justify-center shadow-lg shadow-secondary/20">
                    <i class="fa-solid fa-shield-halved text-2xl text-white"></i>
                </div>
                <h1 class="text-3xl font-black text-white tracking-tighter italic">ADMIN<span class="text-secondary">PRO</span></h1>
            </div>
            
            <div class="flex-grow w-full max-w-4xl flex flex-col md:flex-row gap-3">
                <div class="flex-grow relative">
                    <input type="text" id="advSearchTitle" placeholder="E'lon nomi yoki muallif..." class="w-full bg-darkBg border border-darkBorder p-3 rounded-xl pl-12 focus:border-secondary transition-all outline-none text-sm">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-grayText"></i>
                </div>
                <select id="advSearchGenre" class="bg-darkBg border border-darkBorder p-3 rounded-xl outline-none focus:border-secondary text-sm md:w-48 shrink-0 cursor-pointer">
                    <option value="">Barcha janrlar</option>
                </select>
                <button id="applyFiltersBtn" class="bg-secondary text-white px-6 py-3 rounded-xl font-black hover:scale-[1.02] active:scale-95 transition-all text-sm shrink-0">QIDIRISH</button>
            </div>

            <button onclick="logoutAdmin()" class="text-red-400 hover:text-red-300 text-sm font-bold px-4 py-2 border border-red-500/20 rounded-lg hover:bg-red-500/10 transition-all shrink-0">Chiqish</button>
        </div>
    </header>

    <!-- === ASOSIY QISM === -->
    <main class="container mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 relative items-start">
        
        <!-- CHAP TOMON (Foydalanuvchilar) -->
        <aside class="lg:col-span-4 sticky top-28">
            <div class="bg-darkCard border border-darkBorder rounded-3xl p-6 max-h-[80vh] overflow-y-auto custom-scrollbar shadow-2xl relative">
                <h2 class="text-lg font-black mb-6 text-primary flex items-center gap-3">
                    <i class="fa-solid fa-users-viewfinder"></i> Foydalanuvchilar
                </h2>
                <div id="usersContainer" class="space-y-2">
                    <!-- JS -->
                </div>
            </div>
        </aside>

        <!-- O'NG TOMON (Qidiruv natijalari) -->
        <section class="lg:col-span-8">
            <div class="flex justify-between items-end mb-6 border-b border-darkBorder pb-4">
                <h2 class="text-xl font-black text-lightText">Boshqaruv maydoni</h2>
            </div>
            
            <!-- XATOLIK TO'LIQ TUZATILDI: Endi bu qat'iy Grid. Kartalar aslo cho'zilmaydi, kichik o'lchamda turadi -->
            <div id="adminMainDisplay" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-5 items-start">
                <div class="col-span-full text-center py-20 text-grayText font-black">
                    <i class="fa-solid fa-magnifying-glass text-4xl mb-4 opacity-20 block"></i>
                    Yuqoridan qidiring
                </div>
            </div>
        </section>
    </main>

    <!-- ========================================================================= -->
    <!-- 1. FOYDALANUVCHI PROFILI MODALI -->
    <!-- ========================================================================= -->
    <div id="userProfileModal" style="z-index: 1000;" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center p-4">
        <div class="bg-darkCard w-full max-w-5xl rounded-[2rem] border border-darkBorder shadow-2xl relative animate-zoom-in max-h-[90vh] flex flex-col mx-auto overflow-hidden">
            
            <div class="flex justify-between items-center p-5 border-b border-darkBorder bg-darkBg/80">
                <h3 class="font-black text-lg text-primary m-0"><i class="fa-solid fa-user-shield"></i> Foydalanuvchi Profili</h3>
                <button id="closeProfileModal" class="w-8 h-8 bg-darkCard border border-darkBorder rounded-full flex items-center justify-center hover:bg-red-500/10 hover:text-red-500 transition-colors">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>

            <div id="profileModalContent" class="p-6 overflow-y-auto custom-scrollbar">
                <!-- JS orqali to'ldiriladi -->
            </div>
        </div>
    </div>

    <!-- ========================================================================= -->
    <!-- 2. KITOB TAHRIRLASH MODALI -->
    <!-- ========================================================================= -->
    <div id="adminBookModal" style="z-index: 9999;" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center p-4">
        <div class="bg-darkCard w-full max-w-xl rounded-3xl border border-darkBorder shadow-2xl relative animate-zoom-in border-t-4 border-t-primary mx-auto overflow-hidden flex flex-col max-h-[95vh]">
            
            <div class="flex justify-between items-center p-5 border-b border-darkBorder bg-darkBg/80 shrink-0">
                <h3 class="text-lg font-black text-primary flex items-center gap-2 m-0">
                    <i class="fa-solid fa-pen-to-square"></i> E'lonni Tahrirlash
                </h3>
                <button id="closeBookModal" class="w-8 h-8 bg-darkCard border border-darkBorder rounded-full flex items-center justify-center hover:text-red-500 hover:bg-red-500/10 transition-colors shrink-0">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>
            </div>
            
            <form id="adminBookForm" class="flex flex-col gap-4 p-6 overflow-y-auto custom-scrollbar">
                <input type="hidden" id="adminEbId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-black text-grayText uppercase mb-1 block">Kitob nomi</label><input type="text" id="adminEbTitle" class="w-full bg-darkBg border border-darkBorder p-3 rounded-lg outline-none focus:border-primary text-lightText font-bold text-sm" required></div>
                    <div><label class="text-[10px] font-black text-grayText uppercase mb-1 block">Muallif</label><input type="text" id="adminEbAuthor" class="w-full bg-darkBg border border-darkBorder p-3 rounded-lg outline-none focus:border-primary text-lightText font-bold text-sm" required></div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div><label class="text-[10px] font-black text-grayText uppercase mb-1 block">Narxi (So'm)</label><input type="number" id="adminEbPrice" class="w-full bg-darkBg border border-darkBorder p-3 rounded-lg outline-none focus:border-primary text-lightText font-bold text-sm" required></div>
                    <div><label class="text-[10px] font-black text-grayText uppercase mb-1 block">Sahifalar</label><input type="number" id="adminEbPages" class="w-full bg-darkBg border border-darkBorder p-3 rounded-lg outline-none focus:border-primary text-lightText font-bold text-sm" required></div>
                    <div><label class="text-[10px] font-black text-grayText uppercase mb-1 block">Qog'oz turi</label>
                        <select id="adminEbPaper" class="w-full bg-darkBg border border-darkBorder p-3 rounded-lg outline-none focus:border-primary text-lightText cursor-pointer font-bold text-sm">
                            <option value="Ofset qog'oz (Oq qog'oz)">Ofset qog'oz</option>
                            <option value="Gazeta qog'ozi (Sarg'ish)">Gazeta qog'ozi</option>
                            <option value="Melyovanniy qog'oz (Yaltiroq)">Melyovanniy qog'oz</option>
                            <option value="Kraft qog'oz">Kraft qog'oz</option>
                            <option value="Kitob-dizayner qog'ozi">Dizayner qog'ozi</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3 mt-4 shrink-0">
                    <button type="button" onclick="adminGlobalAction('book', document.getElementById('adminEbId').value)" class="w-1/3 bg-darkBg text-red-500 p-3 rounded-lg font-bold border border-red-500/20 hover:bg-red-500 hover:text-white transition-all text-sm"><i class="fa-solid fa-trash"></i> O'chirish</button>
                    <button type="submit" class="w-2/3 bg-primary text-darkBg p-3 rounded-lg font-black hover:scale-[1.02] transition-all shadow-lg text-sm"><i class="fa-solid fa-check-double"></i> Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/admin.js"></script>
</body>
</html>
